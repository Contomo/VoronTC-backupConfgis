[gcode_macro T99]
variable_active: 0
variable_color: "FF00FF"
variable_tool_number: 99
variable_spool_id: 1
variable_spool_color: "00F0FF"
gcode:
    {% for h in range(0, 1000, 5) %}
        {% set h1 = h / 60 %}
        {% set x = 1 - ((h1 % 2 - 1) * (h1 % 2 - 1)) %}
        {% if h1 < 1 %}
            {% set r, g, b = 1, x, 0 %}
        {% elif h1 < 2 %}
            {% set r, g, b = x, 1, 0 %}
        {% elif h1 < 3 %}
            {% set r, g, b = 0, 1, x %}
        {% elif h1 < 4 %}
            {% set r, g, b = 0, x, 1 %}
        {% elif h1 < 5 %}
            {% set r, g, b = x, 0, 1 %}
        {% else %}
            {% set r, g, b = 1, 0, x %}
        {% endif %}

        {% set r_int = (r * 255)|int %}
        {% set g_int = (g * 255)|int %}
        {% set b_int = (b * 255)|int %}

        {% set r_hex = "%02X"|format(r_int) %}
        {% set g_hex = "%02X"|format(g_int) %}
        {% set b_hex = "%02X"|format(b_int) %}

        {% set hex = r_hex ~ g_hex ~ b_hex %}
        G4 P20
        SET_GCODE_VARIABLE MACRO=T99 VARIABLE=color VALUE="\"{hex}\""
    {% endfor %}



