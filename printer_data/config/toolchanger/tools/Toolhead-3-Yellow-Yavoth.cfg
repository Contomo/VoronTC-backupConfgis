# This file contains common pin mappings for the BIGTREETECH et3
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu et3]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: 70b63482dbf8

[temperature_sensor T3_mcu]
sensor_type: temperature_mcu
sensor_mcu: et3

[tool T3]
tool_number: 3
extruder: extruder3
params_type: 'sc'
fan: T3_partfan

gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

params_park_x: 181
params_park_y: 11.3 # 10.9
params_park_z: 298.4 #298.2

params_input_shaper_freq_x: 55.4
params_input_shaper_type_x: 'MZV'
params_input_shaper_damping_ratio_x: 0.06
params_input_shaper_freq_y: 39.4
params_input_shaper_type_y: 'MZV'
params_input_shaper_damping_ratio_y: 0.13


[tool_probe T3]
pin: ^et3:PB6
tool: 3
z_offset: -1.325  #-1.754   #-1.320 | -1.650
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder3 TEMP=150


[extruder3]
step_pin: et3: PD0
dir_pin: et3: PD1
enable_pin: !et3: PD2
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 5.6
max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et3: PB13
sensor_type: Generic 3950
sensor_pin: et3: PA3
control: pid
pid_Kp=24.696
pid_Ki=1.646
pid_Kd=92.611
min_temp: 0
max_temp: 300

pressure_advance: 0.0
pressure_advance_smooth_time: 0.01

max_extrude_cross_section: 0.64

# sensor_type:MAX31865
# sensor_pin: et3: PA3
# spi_bus: spi1
# rtd_nominal_r: 100
# rtd_reference_r: 430
# rtd_num_of_wires: 2

[tmc2209 extruder3]
uart_pin: et3: PA15
run_current: 0.650
stealthchop_threshold: 999999

[fan_generic T3_partfan]
pin: et3:PA1

[heater_fan T3_hotend_fan]
pin: et3:PA0
heater: extruder3
heater_temp: 50.0


[gcode_macro T3]
variable_active: 0
variable_color: ""
variable_tool_number: 3
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    {action_respond_info("Please home XYZ first")}
  {% else %}
    #_TOOLCHANGER_DISABLE_FILAMENT_SENSORS
    SET_GCODE_VARIABLE MACRO=T3 VARIABLE=active VALUE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder3
    {% set svf = printer.save_variables.variables %}
    # Grab the current tool number so we can remove any z offset that is present
    {% set z_offset_val = svf[ 't' + printer.toolchanger.tool_number|string + '_offset_z'] %}
    # Subtract the tool z_offset from the homing_origin, the remainder is any tweaked z offset
    {% set modified_z = printer.gcode_move.homing_origin.z|float|round(3) - z_offset_val|float|round(3) %}
    # Clear the offsets set by macros
    SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
    # Activate the selected tool
    SELECT_TOOL T={tool_number}
    # Apply the macro offsets, including modified z settings
    SET_GCODE_OFFSET X={svf[ 't' + tool_number|string + '_offset_x']|float|round(3)} Y={svf[ 't' + tool_number|string + '_offset_y']|float|round(3)} Z={svf[ 't' + tool_number|string + '_offset_z'] + modified_z} MOVE=1
    # Update the current tool variable in the save file
    SAVE_VARIABLE VARIABLE=current_tool VALUE={tool_number}
  {% endif %}


[adxl345 T3]
cs_pin: et3: PB12
spi_software_sclk_pin: et3: PB10
spi_software_mosi_pin: et3: PB11
spi_software_miso_pin: et3: PB2
axes_map: x,y,z



