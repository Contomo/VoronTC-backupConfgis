# This file contains common pin mappings for the BIGTREETECH eT3
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu et0]
canbus_uuid: 9422cd1b01cb

[temperature_sensor T0_mcu]
sensor_type: temperature_mcu
sensor_mcu: et0



[tool T0]
tool_number: 0
extruder: extruder
params_type: 'sc'
fan: T0_partfan

gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

params_park_x: 1
params_park_y: 11.8
params_park_z: 301.7 #301.2

params_input_shaper_freq_x: 67.4
params_input_shaper_type_x: 'ZV'
params_input_shaper_damping_ratio_x: 0.04
params_input_shaper_freq_y: 45.4
params_input_shaper_type_y: 'ZV'
params_input_shaper_damping_ratio_y: 0.08

[tool_probe T0]
pin: ^et0:PB6
tool: 0
z_offset: -0.830
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder TEMP=150


[extruder]
step_pin: et0: PD0
dir_pin: et0: PD1
enable_pin: !et0: PD2
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 5.6
max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et0: PB13
sensor_type: Generic 3950
sensor_pin: et0: PA3
control: pid
pid_Kp=30
pid_Ki=19.795
pid_Kd=20

# 170°C | pid_Kp=35.089 pid_Ki=19.493 pid_Kd=15.790
# 190°C | pid_Kp=35.632 pid_Ki=19.795 pid_Kd=16.035
# 200°C | pid_Kp=36.839 pid_Ki=20.466 pid_Kd=16.578
# 215°C | pid_Kp=37.990 pid_Ki=21.106 pid_Kd=17.096
# 240°C | pid_Kp=37.603 pid_Ki=19.283 pid_Kd=18.332


min_temp: 0
max_temp: 300

pressure_advance: 0.0544                                          # See tuning pressure advance doc
pressure_advance_smooth_time: 0.010
max_extrude_cross_section: 0.64

# sensor_type:MAX31865
# sensor_pin: eT3: PA4
# spi_bus: spi1
# rtd_nominal_r: 100
# rtd_reference_r: 430
# rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: et0: PA15
run_current: 0.500
stealthchop_threshold: 999999

[fan_generic T0_partfan]
pin: et0:PA0

[heater_fan T0_hotend_fan]
pin: et0:PA1
heater: extruder
heater_temp: 50.0


[gcode_macro T0]
variable_active: 0
variable_color: ""
variable_tool_number: 0
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    {action_respond_info("Please home XYZ first")}
  {% else %}
    #_TOOLCHANGER_DISABLE_FILAMENT_SENSORS
    SET_GCODE_VARIABLE MACRO=T0 VARIABLE=active VALUE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% set svf = printer.save_variables.variables %}
    # Grab the current tool number so we can remove any z offset that is present
    {% set z_offset_val = svf[ 't' + printer.toolchanger.tool_number|string + '_offset_z'] %}
    # Subtract the tool z_offset from the homing_origin, the remainder is any tweaked z offset
    {% set modified_z = printer.gcode_move.homing_origin.z|float|round(3) - z_offset_val|float|round(3) %}
    # Clear the offsets set by macros
    SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
    # Activate the selected tool
    SELECT_TOOL T={tool_number}
    # Apply the macro offsets, including modified z settings
    SET_GCODE_OFFSET X={svf[ 't' + tool_number|string + '_offset_x']|float|round(3)} Y={svf[ 't' + tool_number|string + '_offset_y']|float|round(3)} Z={svf[ 't' + tool_number|string + '_offset_z'] + modified_z} MOVE=1
    # Update the current tool variable in the save file
    SAVE_VARIABLE VARIABLE=current_tool VALUE={tool_number}
  {% endif %}


[adxl345 T0]
cs_pin: et0: PB12
spi_software_sclk_pin: et0: PB10
spi_software_mosi_pin: et0: PB11
spi_software_miso_pin: et0: PB2
axes_map: x,y,z



