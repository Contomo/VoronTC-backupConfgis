################################## TOOLCHANGER START ##################################

[toolchanger]
t_command_restore_axis:
# params_*: 
  # Extra params to pass to pickup/dropoff gcode. Accessible in the gcode via
  # `toolchanger.params_name`.
  # Also will be copied to any tools for this toolchanger with local
  # values overriding. 
params_debug_messages: True
params_warning_messages: True
params_valid_messages: True
params_safe_y: 150
params_safe_z: 100
params_close_y: 25
params_fast_speed: 12000
params_path_speed: 500
params_type: 'changer_sc'
params_dropoff_path: [{'z':3.5, 'y':4}, {'z':0, 'y':0}, {'z':-12, 'y':0}]
params_pickup_path: [{'z':-12, 'y':2}, {'z':-12, 'y':0}, {'z':1.5, 'y':0, 'f':0.5, 'verify':1}, {'z':0.5, 'y':2.5, 'f':0.5}, {'z':8, 'y':8}]  

initialize_on: first-use
uses_axis: xyz
on_axis_not_homed: home

initialize_gcode:
    _INITIALIZE_FROM_DETECTED_TOOL
    RESPOND MSG="<div style='margin-top: 8px;'><img src='https://tenor.com/view/yakui-yakui-the-maid-nijiura-maids-gif-22874678.gif' width='128' style='vertical-align:middle;' title='woozy'></div>"
    #RESPOND MSG="<div style='margin-top: 8px;'><img src='https://cdn.discordapp.com/attachments/1265167588900601938/1298543388827713546/rapidsave.com_pz9d6vwas1wd1.gif?ex=67e3a7c5&is=67e25645&hm=9d89f734392c2e455d17da182671881ca535793b18f6b9e4555a652de251e4ed&.gif' width='256' style='vertical-align:middle;' title='woozy'></div>"
####### not ssure if   {% if tool.name %} needed

before_change_gcode: 
  {% if printer.tool_probe_endstop.active_tool_number != -1 %}
    DETECT_ACTIVE_TOOL_PROBE
    _before_change_gcode TN={tool.name|replace('tool ', '', 1)}
  {% endif %}

after_change_gcode:
  {% if printer.tool_probe_endstop.active_tool_number != -1 %}
    DETECT_ACTIVE_TOOL_PROBE
    _after_change_gcode TN={tool.name|replace('tool ', '', 1)}
    _LOAD_GCODE_TOOL_OFFSETS
  {% endif %}

dropoff_gcode:
  {% if printer.tool_probe_endstop.active_tool_number != -1 %}
    _dropoff_gcode TN={tool.name|replace('tool ', '', 1)}
  {% endif %}

pickup_gcode:
  {% if printer.tool_probe_endstop.active_tool_number != -1 %}
    _pickup_gcode TN={tool.name|replace('tool ', '', 1)} X={start_position.X} Y={start_position.Y} Z={start_position.Z}
  {% endif %}

restore_axis_gcode:
    {% if printer.tool_probe_endstop.active_tool_number != -1 %}
        _DEBUG_RESPOND MSG="$restore_axis_gcode$ | {dropoff_tool}, {pickup_tool}, {restore_position}, {gcode_position}, {start_position}, {extra_z_offset}"
    {% endif %}
