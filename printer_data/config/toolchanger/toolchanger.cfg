                {% else %}
                    #_VALID_RESPOND MSG="$_SHAPER_CONFIG_CHECK$ | {key} defined in [{name}]"
                {% endif %}
            {% endfor %}
        {% endfor %}
        SET_GCODE_VARIABLE MACRO=_SHAPER_CONFIG_CHECK VARIABLE=first_run VALUE=0
    {% endif %}
