#        _DEBUG_RESPOND MSG="$restore_axis_gcode$ | {dropoff_tool}, {pickup_tool}, {restore_position}, {gcode_position}, {start_position}, {extra_z_offset}"
#        _LOAD_GCODE_TOOL_OFFSETS
#    {% endif %}


################################## TOOLCHANGER END ##################################


# this is where we store our stuff and set it before toolchanger insides tinker with. we want to tinker with it ourselfs to stay flexy.
[gcode_macro TX]
description:"[TN](tool number) all T(num) calls should route here"
variable_old_tn:-1
variable_global_z_offset: 0
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        {action_respond_info("Please home XYZ first")}
    {% elif printer.tool_probe_endstop.active_tool_number == -1  %}
        _DEBUG_RESPOND MSG="$TX$ | no tool mounted rn"
    {% elif printer.tool_probe_endstop.active_tool_number|string == params.TN %}
        _DEBUG_RESPOND MSG="$TX$ | tool already selected, are you retarded?"
    {% else %}
            #SAVE_GCODE_STATE NAME=_toolchange_state
            #{% set global_z_offset = printer.gcode_move.homing_origin.z|float|default(0) - tool.gcode_z_offset|float|default(0) %}
            SET_GCODE_VARIABLE MACRO=TX VARIABLE=old_tn VALUE={printer.tool_probe_endstop.active_tool_number}
            ##################################################################################################################
            # why all of this? because the we need to assign the offsets during th "flying" move of the tool in restoring "XYZ" bbecause we are loading it from a variables file.
            #\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/
                # make sure you dont accidentally zero the offsets before this runs tho, or youll be where we started
                {% set new_tool = params.TN|int %}
                {% set current_tool = printer.tool_probe_endstop.active_tool_number|int %} #printer.toolchanger.detected_tool_number ||||| printer.toolchanger.tool_number
                {% set svf = printer.save_variables.variables %}
                {% set fast = printer.toolchanger.params_fast_speed|float %}
                {% set old_offsets = {"X": svf['t' + current_tool|string + '_offset_x']|default(0), "Y": svf['t' + current_tool|string + '_offset_y']|default(0), "Z": svf['t' + current_tool|string + '_offset_z']|default(0)} %} #old tool offsets
                {% set tx_start_pos = {"X": printer.toolhead.position[0]|float|default(0), "Y": printer.toolhead.position[1]|float|default(0), "Z": printer.toolhead.position[2]|float|default(0) } %} # starting position with old gcode offsets still on
                {% set gcode_pos = {"X": (tx_start_pos["X"] - old_offsets["X"])|default(0)|round(3), "Y": (tx_start_pos["Y"] - old_offsets["Y"])|default(0)|round(3), "Z": (tx_start_pos["Z"] - old_offsets["Z"])|default(0)|round(3)} %} #starting position with absolute offsets
                

                {% if printer.toolchanger.params_debug_toolchanger %}
                    {% set new_offsets = {"X": svf['t' + new_tool|string + '_offset_x']|default(0), "Y": svf['t' + new_tool|string + '_offset_y']|default(0), "Z": svf['t' + new_tool|string + '_offset_z']|default(0)} %} #new tool offsets
                    {% set tx_stop_pos = {"X": (gcode_pos["X"] + new_offsets["X"])|default(0)|round(3), "Y": (gcode_pos["Y"] + new_offsets["Y"])|default(0)|round(3), "Z": (gcode_pos["Z"] + new_offsets["Z"])|default(0)|round(3)} %} #absolute pos with new offsets
                    EXTENDED_RESPOND MSG="$TX$ | Switching from T{current_tool} (off:{old_offsets}) to T{new_tool} (off: {new_offsets} with global off: Z{global_z_offset})" COLOR="secondary"
                    EXTENDED_RESPOND MSG="$TX$ | Restoring (GCODE-OLD) X={tx_start_pos["X"]|default(0)|round(3)}, Y={tx_start_pos["Y"]|default(0)|round(3)}, Z={tx_start_pos["Z"]|default(0)|round(3)}" COLOR="secondary"
                    EXTENDED_RESPOND MSG="$TX$ | Restoring (ABSOLUTE) X={gcode_pos["X"]|default(0)|round(3)}, Y={gcode_pos["Y"]|default(0)|round(3)}, Z={gcode_pos["Z"]|default(0)|round(3)}" COLOR="secondary"
                    EXTENDED_RESPOND MSG="$TX$ | Restoring (GCODE-NEW) X={tx_stop_pos["X"]|default(0)|round(3)}, Y={tx_stop_pos["Y"]|default(0)|round(3)}, Z={tx_stop_pos["Z"]|default(0)|round(3)}" COLOR="secondary"
                {% endif %}    
            #/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\
            # of course if variable_restore_axis is not use, all of this is pretty useless # if you want to keep using the old save config way, this is useless
            ##################################################################################################################
                #SET_GCODE_VARIABLE MACRO=TX VARIABLE=restore_gcode_x VALUE={gcode_pos["X"]|default(0)|round(3)}
                #SET_GCODE_VARIABLE MACRO=TX VARIABLE=restore_gcode_y VALUE={gcode_pos["Y"]|default(0)|round(3)}
                #SET_GCODE_VARIABLE MACRO=TX VARIABLE=restore_gcode_z VALUE={gcode_pos["Z"]|default(0)|round(3)}
                
                #SET_GCODE_VARIABLE MACRO=TX VARIABLE=new_tool VALUE={new_tool}
                #SET_GCODE_VARIABLE MACRO=TX VARIABLE=global_z_offset VALUE={global_z_offset}

                SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0 #soft reset offsets 
                SELECT_TOOL T={new_tool} # select new tool, all in absolute space
                _LOAD_GCODE_TOOL_OFFSETS
                _unselect_tool
    {% endif %}  

[gcode_macro _unselect_tool]
gcode:
    {% if printer.tool_probe_endstop.active_tool_number == -1 %}
        UNSELECT_TOOL
    {% endif %}
#################################################################################################################
# _before_change_gcode ##########################################################################################
#################################################################################################################
[gcode_macro _before_change_gcode]
gcode:
    {% if printer.tool_probe_endstop.active_tool_number != -1 %}
        {% set tn = params.TN|string %}
        {% set tool = printer['tool ' + tn] %}
        {% if printer["gcode_macro " + tn ] %}
            SET_GCODE_VARIABLE MACRO={tn} VARIABLE=color VALUE="''"
        {% endif %}
        _DEBUG_RESPOND MSG="$_before_change_gcode$ | ran for {tn}"
    {% else %}
    _DEBUG_RESPOND MSG="$_before_change_gcode$ | skipped"
    {% endif %}


#################################################################################################################
# _after_change_gcode ###########################################################################################
#################################################################################################################
[gcode_macro _after_change_gcode]
gcode:
    {% if printer.tool_probe_endstop.active_tool_number != -1 %} # if it was successfully picked
        {% set tn = params.TN|string %}
        {% set tool = printer['tool ' + tn] %}
        {% if printer["gcode_macro " + tn ] %}
            SET_GCODE_VARIABLE MACRO={tn} VARIABLE=color VALUE="'c44'"
        {% endif %}
        LOAD_SHAPERS T={tool.tool_number}
        {% if not printer['gcode_macro PRINT_START'].printing %}
            STOP_TOOL_PROBE_CRASH_DETECTION
        {% endif %}
        #SET_STEPPER_ENABLE STEPPER={tool.extruder} ENABLE=1
        _DEBUG_RESPOND MSG="$_after_change_gcode$ | ran for {tn}"
    {% else %}
    _DEBUG_RESPOND MSG="$_after_change_gcode$ | skipped"
    {% endif %}


#################################################################################################################
# _dropoff_gcode ################################################################################################
#################################################################################################################
[gcode_macro _dropoff_gcode]
gcode:
    {% if printer.tool_probe_endstop.active_tool_number != -1 %}
        {% set tn = params.TN|string %}
        {% set tool = printer['tool ' + tn] %}
        {% set x = tool.params_park_x|float %} 
        {% set y = tool.params_park_y|float %} 
        {% set z = tool.params_park_z|float %}
        {% set safe_y = tool.params_safe_y|float %}
        {% set fast = tool.params_fast_speed|float %}
        {% set path = tool.params_dropoff_path %}
        {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
        {% set cur_pos = printer.toolhead.position %}
        G90
        _DEBUG_RESPOND MSG="$_dropoff_gcode$ | dropping {tn}"
        G0 Z{[cur_pos.z + 1.0, max_z]|min } F{fast}
        {% set mid_z = ((cur_pos[2] + path[0]['z'])|float / 2)|round(3) %}
        ROUNDED_G0 Y={[cur_pos.y, tool.params_safe_y]|max} D=20 F={fast} #Y={[cur_pos[1], tool.params_safe_y|max} dont move to save Y if we are abovve it,
        ROUNDED_G0 X={x} Z={mid_z} D=150 F={fast}
        ROUNDED_G0 Z={z + path[0]['z']|float} D=20 F={fast}
        ROUNDED_G0 Y={y + path[0]['y']|float} D=0 F={fast}
        STOP_TOOL_PROBE_CRASH_DETECTION
        {% for pos in path %}
            G0 {% if 'x' in pos %}X{x + pos['x']|float}{% endif %} {% if 'y' in pos %}Y{y + pos['y']|float}{% endif %} {% if 'z' in pos %}Z{z + pos['z']|float }{% endif %} F{tool.params_path_speed|float * (pos.get('f', 1.0)|float)}
        {% endfor %}
        M400
        G0 Y{[cur_pos.y, tool.params_safe_y]|max} F{fast} #check if also a select opetration, if yes, dont do this
        _DEBUG_RESPOND MSG="$_dropoff_gcode$ | dropped {tn}"
    {% else %}
    _DEBUG_RESPOND MSG="$_dropoff_gcode$ | skipped"
    {% endif %}
    #SET_GCODE_VARIABLE MACRO=_TOOLCHANGER_VARS VARIABLE=fan_speed VALUE={ printer[tool.fan].speed * 255|default(0)|int }
    #M106 S0 T{tn}


#################################################################################################################
# pickup_gcode ##################################################################################################
#################################################################################################################
[gcode_macro _pickup_gcode]
gcode:
    {% set tn = params.TN|string %}
    {% set tool = printer['tool ' + tn] %}
    {% set x = tool.params_park_x|float %} 
    {% set y = tool.params_park_y|float %} 
    {% set z = tool.params_park_z|float %}
    {% set ps = tool.params_path_speed %}
    {% set close_y = tool.params_close_y|float %}
    {% set fast = tool.params_fast_speed|float %}
    {% set path = tool.params_pickup_path %}
    G90
    _DEBUG_RESPOND MSG="$_pickup_gcode$ | picking {tn}"
    ROUNDED_G0 Y={close_y} F={fast} D=10
    ROUNDED_G0 X={x} Z={z + path[0]['z']|float} F={fast} D=10
    ROUNDED_G0 Y={y + path[0].get('y', 0)|float} X={x + path[0].get('x', 0)|float} F={fast} D=0 #ROUNDED_G0 Y={y + path[0]['y']|float} F={fast} D=0 $$$ [-1]?
    {% if tool.extruder %}
      M109 T{tool.tool_number} S{printer[tool.extruder].target|int}
    {% endif %}
    {% set ns = namespace(move=True) %}
    {% for pos in path %}
        {% if ns.move %}
            G0 {% if 'x' in pos %}X{x + pos['x']|float}{% endif %} {% if 'y' in pos %}Y{y + pos['y']|float}{% endif %} {% if 'z' in pos %}Z{z + pos['z']|float }{% endif %} F{ps|float * (pos.get('f', 1.0)|float)}
            {% if 'verify' in pos %}{% set ns.move = False %}{% endif %} # stop at verify
        {% endif %}
    {% endfor %}
    M400
    _DEBUG_RESPOND MSG="$_pickup_gcode$ | probably picked up {tn}"
    DETECT_ACTIVE_TOOL_PROBE # only updates printer.tool_probe_endstop.active_tool_number
    _verify_pickup_gcode {rawparams}


#################################################################################################################
# _verify_pickup_gcode ##########################################################################################
#################################################################################################################
[gcode_macro _verify_pickup_gcode]
gcode:
    {% set tn = params.TN|string %}
    {% set tool = printer['tool ' + tn] %}

    {% if printer.tool_probe_endstop.active_tool_number|int == tool.tool_number|int %}
    
        _DEBUG_RESPOND MSG="$_verify_pickup_gcode$ | Detected T{printer.tool_probe_endstop.active_tool_number}, finishing off" COLOR="secondary"
        START_TOOL_PROBE_CRASH_DETECTION T={tool.tool_number}
        {% set path = tool.params_pickup_path %}
        {% set x = tool.params_park_x %}
        {% set y = tool.params_park_y %}
        {% set z = tool.params_park_z %}
        {% set ps = tool.params_path_speed %}
        {% set ns = namespace(move=False) %}
        {% for pos in path %}
            {% if 'verify' in pos %}{% set ns.move = True %}{% endif %}
            {% if ns.move %}
                G0 {% if 'x' in pos %}X{x + pos['x']|float}{% endif %} {% if 'y' in pos %}Y{y + pos['y']|float}{% endif %} {% if 'z' in pos %}Z{z + pos['z']|float }{% endif %} F{ps|float * (pos.get('f', 1.0)|float)}
            {% endif %} # finish off the pickup move
        {% endfor %}
        _DEBUG_RESPOND MSG="$_verify_pickup_gcode$ | finished pickup"
        _LOAD_GCODE_TOOL_OFFSETS T={tn} #loads the offsets from either tool config or SVF
        RESTORE_POSITION {rawparams}
        
    {% elif printer.tool_probe_endstop.active_tool_number|int == -1 %}
        _DEBUG_RESPOND MSG="$_verify_pickup_gcode$ | nope, didnt pick it up"
        _failed_pickup_gcode {rawparams}
    {% else %}
        _DEBUG_RESPOND MSG="$_verify_pickup_gcode$ | wrong tool! hope wife doesnt find out!"
        #todo actually kill printer here lol
    {% endif %}


#################################################################################################################
# RESTORE_POSITION ##############################################################################################
#################################################################################################################
[gcode_macro RESTORE_POSITION]
description: "[X] [Y] [Z] (ABSOLUTE X Y Z position)"
gcode:
    {% if printer.tool_probe_endstop.active_tool_number != -1 %}
        {% set svf = printer.save_variables.variables %}
        {% set rp = dict() %}
        {% set old_tn = 't' ~ printer["gcode_macro TX"].old_tn|string %}
        {% set old_off = {
            "X": svf[old_tn|lower ~ '_offset_x']|float|default(0),
            "Y": svf[old_tn|lower ~ '_offset_y']|float|default(0),
            "Z": svf[old_tn|lower ~ '_offset_z']|float|default(0)
        } %}

        {% if 'X' in params %}{% set _ = rp.update({'X': params.X|float - old_off.X}) %}{% endif %}
        {% if 'Y' in params %}{% set _ = rp.update({'Y': params.Y|float - old_off.Y}) %}{% endif %}
        {% if 'Z' in params %}{% set _ = rp.update({'Z': params.Z|float - old_off.Z}) %}{% endif %}

        {% set tool_name = printer.toolchanger.tool_names[printer.tool_probe_endstop.active_tool_number]|string %}
        {% set tool = printer[tool_name] %}
        {% set fast = tool.params_fast_speed|float %}
        {% set cur_pos = printer.toolhead.position %}
        {% set off = printer.gcode_move.homing_origin %}
        {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
        {% set safe_y = tool.params_safe_y|float %}
        {% set overshoot_y = [max_y - 10.0]|min %}
        {% set dev_y = (overshoot_y - rp.Y)|round(0) %}

        _DEBUG_RESPOND MSG="$RP$ | rawparams={rawparams} old_tn={old_tn} old_off={old_off} cur_off={off} dev_y={dev_y}"
        ROUNDED_G0 X={cur_pos.x + off.x} Y={safe_y} Z={cur_pos.z + off.z} D=10 F={fast}

        {% set mid_z = ((cur_pos.z + rp.Z)|float / 3)|round(3) %}
        {% if 'Z' in rp %} ROUNDED_G0 Z={mid_z} F={fast} D=200 {% endif %}
        {% if 'X' in rp %} ROUNDED_G0 X={rp.X|round(3)} F={fast} D=200 {% endif %}
        {% if 'Y' in rp %} ROUNDED_G0 Y={rp.Y|round(3)} F={fast} D=100 {% endif %}
        {% if 'Z' in rp %} ROUNDED_G0 Z={rp.Z|round(3)} F={fast} D=5 {% endif %}
        ROUNDED_G0 D=0
    {% else %}
        _DEBUG_RESPOND MSG="$RESTORE_POSITION$ | cannot restore position, got no tool!"
    {% endif %}




[gcode_macro _LOAD_GCODE_TOOL_OFFSETS]
variable_global_z_offset: 0
description: "[TN] [Z] (TN: ie T0, T1....), (Z: global z off) if not provided loads current tools (or fallback of current tools)"
gcode:
    {% set global_z_offset = params.Z|default(0)|float %}

    {% set tn = params.TN|default(printer.toolchanger.tool_names[printer['tool_probe_endstop'].active_tool_number])|string|replace('tool ', '', 1) %} ##FIX if endstop -1 loads last tool offsets, check its not  -1
    {% set offsets = {"X": 0, "Y": 0, "Z": 0} %}
    {% if 'tool ' + tn in printer %}
        {% set tool = printer['tool ' + tn] %}
        {% if tool.tool_number != 0 %}
            {% set svf = printer.save_variables.variables %}
            {% if (tn|lower ~ '_offset_x') in svf and (tn|lower ~ '_offset_y') in svf and (tn|lower ~ '_offset_z') in svf %}
                {% set offsets = {"X": svf[tn|lower ~ '_offset_x']|float|default(0),"Y": svf[tn|lower ~ '_offset_y']|float|default(0),"Z": svf[tn|lower ~ '_offset_z']|float|default(0) - global_z_offset|float} %}
                _DEBUG_RESPOND MSG="$_LOAD_GCODE_TOOL_OFFSETS$ | Set offsets for {tn} from [save_variables] (X{offsets.X|round(2)} Y{offsets.Y|round(2)} Z{(offsets.Z + global_z_offset)|round(2)})"
            {% endif %}
            ; Apply final offsets once
            SET_GCODE_OFFSET X={offsets.X|round(3)} Y={offsets.Y|round(3)} Z={offsets.Z|round(3)} MOVE=0
        {% endif %}
    {% else %}
        _DEBUG_RESPOND MSG="$_LOAD_GCODE_TOOL_OFFSETS$ | No 'tool {tn}' in printer object."
    {% endif %}


[gcode_macro DETECT_OFFSET_TEMPLATE]
description: "Detect common offset variable patterns and inconsistencies"
gcode:
    {% set ns = namespace(
        keys = printer|list,
        patterns = [],
        counts = [],
        zeroed = []
    ) %}

    {% for key in ns.keys %}
        {% if "_offset_" in key %}
            {% set parts = key.split('_') %}
            {% if parts|length >= 3 %}
                {% set templ = parts[0][:1] ~ '*_' ~ parts[1] ~ '_' ~ parts[2] %}
                {% set val = printer[key] %}
                {% set idx = -1 %}
                {% for i in range(ns.patterns|length) %}
                    {% if ns.patterns[i] == templ %}
                        {% set idx = i %}
                    {% endif %}
                {% endfor %}
                {% if idx == -1 %}
                    {% set ns.patterns = ns.patterns + [templ] %}
                    {% set ns.counts = ns.counts + [1 if val != 0 else 0] %}
                {% else %}
                    {% set ns.counts = ns.counts[:idx] + [ns.counts[idx] + (1 if val != 0 else 0)] + ns.counts[idx+1:] %}
                {% endif %}
                {% if val == 0 %}
                    {% set ns.zeroed = ns.zeroed + [key] %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endfor %}

    {% if ns.patterns|length > 0 %}
        {% set max_idx = 0 %}
        {% for i in range(1, ns.counts|length) %}
            {% if ns.counts[i] > ns.counts[max_idx] %}
                {% set max_idx = i %}
            {% endif %}
        {% endfor %}
        RESPOND TYPE=echo MSG="Most common offset pattern: {ns.patterns[max_idx]}"
        {% for i in range(ns.patterns|length) %}
            RESPOND TYPE=echo MSG="{ns.patterns[i]} → {ns.counts[i]} offset(s)"
        {% endfor %}
    {% else %}
        RESPOND TYPE=echo MSG="No offset-style variables found."
    {% endif %}

    {% if ns.zeroed %}
        RESPOND TYPE=echo MSG="Zero (undefined) offsets: {ns.zeroed|join(', ')}"
    {% endif %}





[gcode_macro _GCODE_OFFSET_AUTODETECT]
description: Autodetects offset source (tool config vs save_variables) and reports issues.
variable_gcode_offsets_in_tools: 0
variable_gcode_offsets_in_safe_vars: 0
gcode:
    {% set tool_names = printer.toolchanger.tool_names %}
    {% set svf = printer.save_variables.variables if "save_variables" in printer.configfile.config else {} %}
    {% set ns = namespace(
        config_offsets=[], svf_offsets=[], both_offsets=[], partial_svf=[], no_offsets=[]
    ) %}

    {% for tool_name in tool_names %}
        {% set tool = printer[tool_name] %}
        {% set tn = tool_name|string|replace('tool ', '', 1)|lower %}

        {% set config_has_offset = tool.gcode_x_offset != 0 or tool.gcode_y_offset != 0 or tool.gcode_z_offset != 0 %}
        {% set svf_x = tn ~ '_offset_x' %}
        {% set svf_y = tn ~ '_offset_y' %}
        {% set svf_z = tn ~ '_offset_z' %}
        {% set svf_has_all = svf_x in svf and svf_y in svf and svf_z in svf %}
        {% set svf_has_any = svf_x in svf or svf_y in svf or svf_z in svf %}

        {% if config_has_offset and not svf_has_any %}
            {% set ns.config_offsets = ns.config_offsets + [tool_name] %}
        {% elif svf_has_all and not config_has_offset %}
            {% set ns.svf_offsets = ns.svf_offsets + [tool_name] %}
        {% elif config_has_offset and svf_has_all %}
            {% set ns.both_offsets = ns.both_offsets + [tool_name] %}
        {% elif svf_has_any and not svf_has_all %}
            {% set ns.partial_svf = ns.partial_svf + [tool_name] %}
        {% else %}
            {% set ns.no_offsets = ns.no_offsets + [tool_name] %}
        {% endif %}
    {% endfor %}

    ; Report Results
    {% if ns.config_offsets %}
        _VALID_RESPOND MSG="$_GCODE_OFFSET_AUTODETECT$ | Offsets from config for: {ns.config_offsets|join(', ')}"
    {% endif %}
    {% if ns.svf_offsets %}
        _VALID_RESPOND MSG="$_GCODE_OFFSET_AUTODETECT$ | Offsets from save_variables for: {ns.svf_offsets|join(', ')}"
    {% endif %}
    {% if ns.both_offsets %}
        _WARNING_RESPOND MSG="$_GCODE_OFFSET_AUTODETECT$ | Conflict: Both config and save_variables offsets for: {ns.both_offsets|join(', ')}"
    {% endif %}
    {% if ns.partial_svf %}
        _WARNING_RESPOND MSG="$_GCODE_OFFSET_AUTODETECT$ | Partial offsets in save_variables for: {ns.partial_svf|join(', ')}"
    {% endif %}
    {% if ns.no_offsets %}
        _DEBUG_RESPOND MSG="$_GCODE_OFFSET_AUTODETECT$ | No offsets found for: {ns.no_offsets|join(', ')}"
    {% endif %}
        # todo: if it's present in both, tell the user, if some are present in one and some in others, tell the user. Only one shall be used.
        # todo: crawl config to look for other definitions of tool name/number offsets and report custom



