[gcode_macro _INITIALIZE_FROM_DETECTED_TOOL_IMPL]
gcode:
  {% if printer.tool_probe_endstop.active_tool_number|int == -1 %}
    _WARNING_RESPOND MSG="$_INITIALIZE_FROM_DETECTED_TOOL_IMPL$ | no active tool probe, not initilizing"
    PAUSE
  {% else %}
    _DEBUG_RESPOND MSG="$_INITIALIZE_FROM_DETECTED_TOOL_IMPL$ | initializing toolchanger"
